<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>盈鑫發電機雲端系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Noto+Sans+TC:wght@400;700&display=swap');
  :root { --bg: #0a0e1a; --card: #161d2e; --border: #1e2d45; --accent: #f59e0b; --text: #e2e8f0; --text2: #94a3b8; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin:0; padding:0; }
  #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
  .login-card { width: 85%; max-width: 350px; padding: 30px; background: var(--card); border-radius: 15px; border: 1px solid var(--border); text-align: center; }
  .pwd-container { position: relative; margin: 15px 0; }
  .pwd-container input { width: 100%; padding: 12px; padding-right: 45px; background: #0a0e1a; color: white; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; }
  .toggle-pwd { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2rem; }
  .nav { display: none; background: #111827; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:100; }
  .nav-btn { flex:1; padding: 15px; text-align:center; color: #64748b; font-weight:bold; cursor:pointer; }
  .nav-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  .container { display: none; padding: 15px; max-width: 600px; margin: auto; }
  .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
  input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #0a0e1a; color: white; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
  button.primary { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; font-size: 1.1rem; cursor: pointer; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-card">
    <h1 style="font-family:Rajdhani; color:var(--accent); margin:0;">YING XIN</h1>
    <div class="pwd-container">
      <input type="password" id="sysPwd" placeholder="請輸入授權密碼">
      <span class="toggle-pwd" onclick="togglePwd()">👁️</span>
    </div>
    <button class="primary" id="loginBtn" onclick="doLogin()">安全登入</button>
    <p id="loginError" style="color:#ef4444; font-size:0.8rem; margin-top:15px;"></p>
  </div>
</div>

<div class="nav" id="mainNav">
  <div class="nav-btn active" onclick="showTab('home')">首頁</div>
  <div class="nav-btn" onclick="showTab('record')">數據</div>
  <div class="nav-btn" onclick="showTab('report')">報表</div>
</div>

<div id="home" class="container"><div class="card"><h2>DASHBOARD</h2><p style="color:var(--text2)">系統在線，歡迎使用。</p></div></div>

<div id="record" class="container">
  <div class="card">
    <h2>ADD RECORD</h2>
    <select id="genId"></select>
    <input type="number" id="hours" placeholder="儀表時數 (hr)" inputmode="decimal">
    <input type="text" id="location" placeholder="GPS 讀取中..." readonly>
    <input type="file" id="photo" accept="image/*" capture="camera">
    <textarea id="note" placeholder="備註..."></textarea>
    <button class="primary" id="saveBtn" onclick="handleSave()">儲存並同步</button>
  </div>
</div>

<div id="report" class="container">
  <div class="card"><h2>REPORT</h2><div id="cloudReport">載入中...</div></div>
</div>

<script>
  // 已更新為你提供的最新網址
  const API_URL = "https://script.google.com/macros/s/AKfycbxKkbP77jU22O9EGNExXolE7UQcdUzXq0AJZOs-Z6vq7b9EYCDfwM4yfGNkMYcPvKPgVQ/exec"; 

  function togglePwd() {
    const p = document.getElementById('sysPwd');
    p.type = (p.type === "password") ? "text" : "password";
  }

  async function doLogin() {
    const pwd = document.getElementById('sysPwd').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    if(!pwd) return;

    btn.disabled = true; btn.textContent = "驗證中...";
    err.textContent = "";

    try {
      const res = await fetch(`${API_URL}?action=login&auth=${encodeURIComponent(pwd)}`);
      const result = await res.json();
