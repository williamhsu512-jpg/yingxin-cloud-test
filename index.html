<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>盈鑫發電機雲端管理系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root {
    --bg: #0a0e1a; --bg2: #111827; --card: #161d2e; --border: #1e2d45;
    --accent: #f59e0b; --accent3: #10b981; --text: #e2e8f0; --text2: #94a3b8;
  }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin:0; padding:0; }
  #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
  .login-card { width: 85%; max-width: 350px; padding: 30px; background: var(--card); border-radius: 15px; border: 1px solid var(--border); text-align: center; }
  .nav { display: none; background: var(--bg2); position: sticky; top:0; z-index:100; border-bottom: 1px solid var(--border); }
  .nav-btn { flex:1; padding: 15px 5px; text-align:center; color: #64748b; font-size: 0.85rem; cursor:pointer; font-weight:bold; }
  .nav-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  .container { display: none; padding: 15px; padding-bottom: 80px; max-width: 600px; margin: auto; }
  .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
  h2 { font-family: 'Rajdhani', sans-serif; margin-top:0; color: var(--accent); }
  input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #0a0e1a; color: white; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
  button.primary { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; font-size: 1.1rem; cursor: pointer; }
  .report-img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-card">
    <h1 style="font-family:Rajdhani; color:var(--accent);">YING XIN LOGIN</h1>
    <input type="password" id="sysPwd" placeholder="請輸入系統密碼">
    <button class="primary" id="loginBtn" onclick="doLogin()">登入系統</button>
    <p id="loginError" style="color:#ef4444; font-size:0.8rem; margin-top:10px;"></p>
  </div>
</div>

<div class="nav" id="mainNav">
  <div class="nav-btn active" onclick="showTab('home')">首頁</div>
  <div class="nav-btn" onclick="showTab('record')">記錄</div>
  <div class="nav-btn" onclick="showTab('report')">報表</div>
  <div class="nav-btn" onclick="showTab('settings')">系統</div>
</div>

<div id="home" class="container tab-content" style="display:block;">
  <div class="card"><h2>DASHBOARD</h2><p style="color:var(--text2)">連線狀態：<span style="color:var(--accent3)">● 已加密連線</span></p></div>
</div>

<div id="record" class="container tab-content">
  <div class="card">
    <h2>ADD RECORD</h2>
    <select id="genId"></select>
    <input type="number" id="hours" placeholder="儀表讀數 (hr)">
    <input type="text" id="location" placeholder="GPS 讀取中..." readonly>
    <input type="file" id="photo" accept="image/*" capture="camera">
    <textarea id="note" placeholder="保養備註..."></textarea>
    <button class="primary" id="saveBtn" onclick="handleSave()">儲存並同步雲端</button>
  </div>
</div>

<div id="report" class="container tab-content">
  <div class="card"><h2>CLOUD REPORT</h2><div id="cloudReport">載入中...</div></div>
</div>

<div id="settings" class="container tab-content">
  <button onclick="localStorage.removeItem('isLoggedIn'); location.reload();" style="background:#ef4444; color:white; border:none; padding:15px; border-radius:8px; width:100%;">登出系統</button>
</div>

<script>
  // ──【請在這裡填入你的 GAS 網址】──
  const API_URL = "在此貼上你的網址"; 

  async function doLogin() {
    const pwd = document.getElementById('sysPwd').value;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = "驗證中...";
    try {
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "login", password: pwd }) });
      const data = await res.json();
      if(data.status === "success") { localStorage.setItem('isLoggedIn', 'true'); enterApp(); }
      else { document.getElementById('loginError').textContent = "密碼錯誤"; }
    } catch(e) { document.getElementById('loginError').textContent = "伺服器連線失敗"; }
    btn.disabled = false; btn.textContent = "登入系統";
  }

  function enterApp() {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainNav').style.display = 'flex';
    document.getElementById('home').style.display = 'block';
  }
  if(localStorage.getItem('isLoggedIn') === 'true') enterApp();

  const GEN_LIST = ["300-01","300-02","300-03","300-04","220-01","220-02","150-01","150-02","150-03","125-01","125-02","100-01","100-02","90-01","60-01","60-02","60-03","60-04","60-05","60-06","60-07","60-08","60-09","60-10","60-11","45-02","45-03","45-04","45-05","45-05(換殼)","45-06","45-07","45-08","45-09","45-10","45-11","45-12","45-13","45-14","30-01","25-01","25-02","25-04","25-05","25-06","25-07","25-08","25-09","15-01","13-01","13-02","7.5kva","70-01-C","汽油4001","汽油7801","汽油8200","500-01","400-01-B","400-02-B","350-01","300-01-B","300-02-B","汽油點焊機"];
  const sel = document.getElementById('genId');
  GEN_LIST.forEach(id => { let o = document.createElement('option'); o.value = id; o.textContent = id; sel.appendChild(o); });

  function showTab(t) {
    document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
    document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
    document.getElementById(t).style.display = 'block';
    event.currentTarget.classList.add('active');
    if(t === 'report') fetchReport();
  }

  async function handleSave() {
    const id = document.getElementById('genId').value;
    const hr = document.getElementById('hours').value;
    if(!id || !hr) return alert("請輸入時數");
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = "壓縮上傳中...";
    const file = document.getElementById('photo').files[0];
    let base64 = "";
    if(file) base64 = await compressImage(file, 1024, 0.7);
    const payload = { genId: id, hours: hr, location: document.getElementById('location').value, note: document.getElementById('note').value, photo: base64, user: "管理員" };
    try {
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
      if(res.ok) { alert("同步成功！"); location.reload(); }
    } catch(e) { alert("同步失敗"); }
    btn.disabled = false; btn.textContent = "儲存並同步雲端";
  }

  function compressImage(file, maxWidth, quality) {
    return new Promise((resolve) => {
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image(); img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
      };
    });
  }

  async function fetchReport() {
    const box = document.getElementById('cloudReport'); box.innerHTML = "讀取中...";
    try {
      const res = await fetch(API_URL); const data = await res.json();
      let html = "";
      data.reverse().forEach(r => {
        html += `<div style="border-bottom:1px solid #1e2d45; padding:15px 0;">
          <small style="color:var(--accent3)">${new Date(r[0]).toLocaleString()}</small><br>
          <strong style="color:var(--accent);">${r[1]}</strong> | ${r[2]} hr<br>
          <span style="font-size:0.9rem; color:var(--text2)">${r[5] || ''}</span>
          ${r[4] ? `<img src="${r[4]}" class="report-img" onclick="window.open(this.src)">` : ''}
        </div>`;
      });
      box.innerHTML = html || "無資料";
    } catch(e) { box.innerHTML = "連線失敗"; }
  }

  navigator.geolocation.getCurrentPosition(p => {
    document.getElementById('location').value = p.coords.latitude.toFixed(4) + "," + p.coords.longitude.toFixed(4);
  });
</script>
</body>
</html>
