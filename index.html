<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>盈鑫雲端系統</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap');

    :root {
      --bg: #060910;
      --card: #0d1321;
      --accent: #f59e0b;
      --accent2: #fbbf24;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #1a2540;
      --success: #10b981;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 背景動態光效 */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(245,158,11,0.06) 0%, transparent 70%);
      top: -200px; left: -200px;
      animation: drift1 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(16,185,129,0.04) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: drift2 15s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(80px, 60px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-60px, -40px); } }

    /* 掃描線效果 */
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none; z-index: 0;
    }

    .card {
      background: var(--card);
      padding: 40px 36px;
      border-radius: 20px;
      width: 90%;
      max-width: 360px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 卡片頂部裝飾線 */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
    }

    .logo-wrap {
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-size: 1.6rem;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.2); }
      50%      { box-shadow: 0 0 0 8px rgba(245,158,11,0); }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: var(--accent);
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 3px;
      line-height: 1;
    }

    .sub {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 22px 0;
    }

    .field-label {
      text-align: left;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .pwd-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 14px 46px 14px 16px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Noto Sans TC', sans-serif;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: rgba(245,158,11,0.5);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.08);
    }

    .eye {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.1rem;
      opacity: 0.5;
      transition: opacity 0.2s;
      user-select: none;
    }
    .eye:hover { opacity: 1; }

    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      color: #000;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-appearance: none;
      position: relative;
      overflow: hidden;
    }

    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* 按鈕 shimmer */
    .login-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2.5s ease-in-out infinite;
    }
    @keyframes shimmer { to { left: 150%; } }

    #msg {
      font-size: 0.82rem;
      margin-top: 14px;
      min-height: 1.2em;
      line-height: 1.5;
      white-space: pre-line;
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
      animation: blink 2s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

    .footer-note {
      margin-top: 20px;
      font-size: 0.72rem;
      color: #2a3a55;
    }

    /* ── 主畫面 ── */
    #mainApp { display: none; }

    .main-card {
      background: var(--card);
      padding: 36px;
      border-radius: 20px;
      width: 90%; max-width: 360px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
      text-align: center;
      position: relative; z-index: 1;
      animation: cardIn 0.5s ease both;
    }

    .main-card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--success), transparent);
      border-radius: 2px;
    }

    .success-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(16,185,129,0.05));
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      font-size: 1.8rem;
    }

    .main-card h2 {
      font-family: 'Orbitron', sans-serif;
      color: var(--success);
      font-size: 1.2rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .main-card p {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .logout-btn {
      margin-top: 24px;
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      -webkit-appearance: none;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>
  <div class="scanlines"></div>

  <!-- ── 登入頁 ── -->
  <div id="loginPage" class="card">
    <div class="logo-wrap">
      <div class="logo-icon">⚡</div>
      <h1>YING XIN</h1>
      <div class="sub">盈鑫發電機雲端管理系統</div>
    </div>

    <hr class="divider">

    <div class="field-label">授權密碼</div>
    <div class="pwd-wrap">
      <input type="password" id="sysPwd" placeholder="請輸入系統授權密碼" autocomplete="off">
      <span id="eyeBtn" class="eye">👁️</span>
    </div>

    <button class="login-btn" id="loginBtn">安全登入</button>

    <div id="msg"></div>

    <div class="footer-note">
      <span class="status-dot"></span>系統伺服器運作中
    </div>
  </div>

  <!-- ── 主畫面 ── -->
  <div id="mainApp" class="main-card">
    <div class="success-icon">✅</div>
    <h2>ACCESS GRANTED</h2>
    <p>系統驗證成功<br>已進入盈鑫管理主畫面</p>
    <button class="logout-btn" id="logoutBtn">登出系統</button>
  </div>

  <script>
    // ── DOM 綁定 ──
    const pwdInput = document.getElementById('sysPwd');
    const eyeBtn   = document.getElementById('eyeBtn');
    const loginBtn = document.getElementById('loginBtn');
    const msg      = document.getElementById('msg');

    // ── 切換密碼顯示 ──
    eyeBtn.addEventListener('click', () => {
      const show = pwdInput.type === 'password';
      pwdInput.type = show ? 'text' : 'password';
      eyeBtn.textContent = show ? '🙈' : '👁️';
    });

    // ── 按下 Enter 觸發登入 ──
    pwdInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') loginBtn.click();
    });

    // ── 登入邏輯（使用 google.script.run，無 CORS 問題）──
    loginBtn.addEventListener('click', () => {
      const pwd = pwdInput.value.trim();
      if (!pwd) {
        showMsg('❗ 請先輸入授權密碼', 'warn');
        return;
      }

      setLoading(true);
      showMsg('🔐 驗證中，請稍候...', 'info');

      // google.script.run 是 GAS Web App 專用橋接，不走跨網域
      google.script.run
        .withSuccessHandler(onLoginSuccess)
        .withFailureHandler(onLoginError)
        .loginUser(pwd);
    });

    function onLoginSuccess(result) {
      setLoading(false);
      if (result && result.status === 'success') {
        showMsg('✅ 驗證成功，正在跳轉...', 'ok');
        setTimeout(() => {
          document.getElementById('loginPage').style.display = 'none';
          document.getElementById('mainApp').style.display   = 'block';
        }, 600);
      } else {
        showMsg('❌ 密碼錯誤，請重新輸入', 'err');
        pwdInput.value = '';
        pwdInput.focus();
      }
    }

    function onLoginError(err) {
      setLoading(false);
      console.error('GAS Error:', err);
      showMsg('❌ 伺服器錯誤，請聯絡管理員\n' + (err.message || ''), 'err');
    }

    // ── 登出 ──
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      document.getElementById('mainApp').style.display   = 'none';
      document.getElementById('loginPage').style.display = 'block';
      pwdInput.value = '';
      showMsg('', '');
    });

    // ── 工具函式 ──
    function setLoading(on) {
      loginBtn.disabled    = on;
      loginBtn.textContent = on ? '驗證中...' : '安全登入';
    }

    function showMsg(text, type) {
      msg.textContent = text;
      msg.style.color = {
        err:  'var(--danger)',
        ok:   'var(--success)',
        info: '#94a3b8',
        warn: 'var(--accent)',
        '':   'transparent'
      }[type] || '#94a3b8';
    }
  </script>
</body>
</html>
