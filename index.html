<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>盈鑫雲端系統</title>
  <style>
    :root { --bg: #0a0e1a; --accent: #f59e0b; --text: #e2e8f0; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .card { background: #161d2e; padding: 35px; border-radius: 15px; width: 85%; max-width: 340px; border: 1px solid #1e2d45; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; }
    h1 { color: var(--accent); margin: 0 0 5px 0; font-size: 1.8rem; letter-spacing: 1px; }
    .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px; }
    .pwd-wrap { position: relative; margin-bottom: 20px; }
    input { width: 100%; padding: 14px; background: #000; color: #fff; border: 1px solid #1e2d45; border-radius: 10px; box-sizing: border-box; font-size: 1.1rem; outline: none; }
    .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.3rem; opacity: 0.7; }
    button { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: #000; }
    #msg { color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; min-height: 1.2em; }
    #mainApp { display: none; }
  </style>
</head>
<body>

  <div id="loginPage" class="card">
    <h1>YING XIN</h1>
    <div class="sub">盈鑫發電機管理系統</div>
    <div class="pwd-wrap">
      <input type="password" id="sysPwd" placeholder="請輸入授權密碼">
      <span id="eyeBtn" class="eye">👁️</span>
    </div>
    <button id="loginBtn">安全登入</button>
    <div id="msg"></div>
  </div>

  <div id="mainApp" class="card">
    <h2 style="color:var(--accent)">連線成功</h2>
    <p>系統已進入管理主畫面</p>
    <button onclick="localStorage.clear(); location.reload();" style="background:#444; color:#fff;">登出系統</button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxKkbP77jU22O9EGNExXolE7UQcdUzXq0AJZOs-Z6vq7b9EYCDfwM4yfGNkMYcPvKPgVQ/exec";

    const pwdInput = document.getElementById('sysPwd');
    const eyeBtn = document.getElementById('eyeBtn');
    const loginBtn = document.getElementById('loginBtn');
    const msg = document.getElementById('msg');

    eyeBtn.addEventListener('click', () => {
      if (pwdInput.type === "password") {
        pwdInput.type = "text";
        eyeBtn.textContent = "🙈";
      } else {
        pwdInput.type = "password";
        eyeBtn.textContent = "👁️";
      }
    });

    loginBtn.addEventListener('click', async () => {
      const pwd = pwdInput.value;
      if (!pwd) { msg.textContent = "請輸入密碼"; return; }

      loginBtn.disabled = true;
      loginBtn.textContent = "驗證中...";
      msg.textContent = "";

      try {
        const response = await fetch(`${API_URL}?action=login&auth=${encodeURIComponent(pwd)}`);
        const data = await response.json();

        if (data.status === "success") {
          localStorage.setItem('isLoggedIn', 'true');
          showMain();
        } else {
          msg.textContent = "❌ 密碼錯誤";
        }
      } catch (e) {
        msg.textContent = "❌ 連線失敗，請檢查 GAS 權限";
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "安全登入";
      }
    });

    function showMain() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
    }

    if (localStorage.getItem('isLoggedIn') === 'true') {
      showMain();
    }
  </script>
</body>
</html>
