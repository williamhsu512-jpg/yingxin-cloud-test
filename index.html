<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>盈鑫雲端系統</title>
  <style>
    :root { --bg: #0a0e1a; --accent: #f59e0b; --text: #e2e8f0; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .card { background: #161d2e; padding: 35px; border-radius: 15px; width: 85%; max-width: 340px; border: 1px solid #1e2d45; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; }
    h1 { color: var(--accent); margin: 0 0 5px 0; font-size: 1.8rem; letter-spacing: 1px; }
    .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px; }
    .pwd-wrap { position: relative; margin-bottom: 20px; }
    input { width: 100%; padding: 14px; background: #000; color: #fff; border: 1px solid #1e2d45; border-radius: 10px; box-sizing: border-box; font-size: 1.1rem; outline: none; -webkit-appearance: none; }
    .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.3rem; z-index: 10; }
    button { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: #000; -webkit-appearance: none; }
    #msg { color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; min-height: 1.2em; line-height: 1.4; }
    #mainApp { display: none; }
  </style>
</head>
<body>

  <div id="loginPage" class="card">
    <h1>YING XIN</h1>
    <div class="sub">盈鑫發電機管理系統</div>
    <div class="pwd-wrap">
      <input type="password" id="sysPwd" placeholder="請輸入授權密碼" autocomplete="off">
      <span id="eyeBtn" class="eye">👁️</span>
    </div>
    <button id="loginBtn">安全登入</button>
    <div id="msg"></div>
  </div>

  <div id="mainApp" class="card">
    <h2 style="color:var(--accent)">連線成功</h2>
    <p>系統已進入管理主畫面</p>
    <button id="logoutBtn" style="background:#444; color:#fff; margin-top:20px;">登出系統</button>
  </div>

  <script>
    // 鎖定您提供的正確網址
    const API_URL = "https://script.google.com/macros/s/AKfycbxKkbP77jU22O9EGNExXolE7UQcdUzXq0AJZOs-Z6vq7b9EYCDfwM4yfGNkMYcPvKPgVQ/exec";

    const pwdInput = document.getElementById('sysPwd');
    const eyeBtn = document.getElementById('eyeBtn');
    const loginBtn = document.getElementById('loginBtn');
    const msg = document.getElementById('msg');

    // 密碼顯示切換
    eyeBtn.addEventListener('click', () => {
      if (pwdInput.type === "password") {
        pwdInput.type = "text";
        eyeBtn.textContent = "🙈";
      } else {
        pwdInput.type = "password";
        eyeBtn.textContent = "👁️";
      }
    });

    // 登入邏輯
    loginBtn.addEventListener('click', async () => {
      const pwd = pwdInput.value;
      if (!pwd) { msg.textContent = "請輸入密碼"; return; }

      loginBtn.disabled = true;
      loginBtn.textContent = "連線中...";
      msg.style.color = "#94a3b8";
      msg.textContent = "正在穿透防火牆...";

      try {
        // 使用 cache: 'no-cache' 強迫瀏覽器更新，不抓舊的錯誤紀錄
        const targetUrl = `${API_URL}?action=login&auth=${encodeURIComponent(pwd)}`;
        const response = await fetch(targetUrl, {
          method: 'GET',
          mode: 'cors',
          cache: 'no-cache',
          redirect: 'follow'
        });

        if (!response.ok) throw new Error("網路回應異常");

        const data = await response.json();

        if (data.status === "success") {
          localStorage.setItem('isLoggedIn', 'true');
          location.reload();
        } else {
          msg.style.color = "#ff4d4d";
          msg.textContent = "❌ 密碼錯誤，請重新檢查";
        }
      } catch (e) {
        console.error(e);
        msg.style.color = "#ff4d4d";
        msg.textContent = "❌ 連線遭攔截。請嘗試：\n1. 開啟「無痕分頁」測試\n2. 檢查 GAS 權限是否為「所有人」";
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "安全登入";
      }
    });

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.clear();
      location.reload();
    });

    if (localStorage.getItem('isLoggedIn') === 'true') {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
    }
  </script>
</body>
</html>
