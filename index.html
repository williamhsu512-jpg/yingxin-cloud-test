<script>
  // ──【核心設定】──
  const API_URL = "https://script.google.com/macros/s/AKfycbzpz9h6KONuRL2K4FT0c_kuNppiqZ57mctyEnCa7RxsYGr65-csmOHL-uL126mvXf9X3g/exec"; 

  // 登入邏輯：修正 Fetch 模式以避免無反應
  async function doLogin() {
    const pwd = document.getElementById('sysPwd').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    if(!pwd) return;

    btn.disabled = true; btn.textContent = "驗證中...";
    err.textContent = "";

    try {
      // 改用 JSONP 概念或簡單 GET 請求來繞過 CORS 驗證
      const checkUrl = `${API_URL}?action=login&auth=${encodeURIComponent(pwd)}`;
      const res = await fetch(checkUrl);
      const result = await res.json();

      if(result.status === "success") {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('sysToken', pwd);
        enterApp();
      } else {
        err.textContent = "❌ 授權密碼錯誤";
      }
    } catch(e) {
      console.error(e);
      err.textContent = "❌ 伺服器連線失敗，請檢查 GAS 是否部署為「所有人」";
    } finally {
      btn.disabled = false; btn.textContent = "安全登入";
    }
  }

  function enterApp() {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainNav').style.display = 'flex';
    document.getElementById('home').style.display = 'block';
    showTab('home');
  }

  function logout() {
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('sysToken');
    location.reload();
  }

  if(localStorage.getItem('isLoggedIn') === 'true') enterApp();

  // --- 發電機清單與其餘功能保持不變 ---
  const GEN_LIST = ["300-01","300-02","300-03","300-04","220-01","220-02","150-01","150-02","150-03","125-01","125-02","100-01","100-02","90-01","60-01","60-02","60-03","60-04","60-05","60-06","60-07","60-08","60-09","60-10","60-11","45-02","45-03","45-04","45-05","45-05(換殼)","45-06","45-07","45-08","45-09","45-10","45-11","45-12","45-13","45-14","30-01","25-01","25-02","25-04","25-05","25-06","25-07","25-08","25-09","15-01","13-01","13-02","7.5kva","70-01-C","汽油4001","汽油7801","汽油8200","500-01","400-01-B","400-02-B","350-01","300-01-B","300-02-B","汽油點焊機"];
  const sel = document.getElementById('genId');
  GEN_LIST.forEach(id => {
    let o = document.createElement('option'); o.value = id; o.textContent = id; sel.appendChild(o);
  });

  function showTab(t) {
    document.querySelectorAll('.container').forEach(e => e.style.display = 'none');
    document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
    document.getElementById(t).style.display = 'block';
    if(t === 'report') fetchReport();
  }

  async function handleSave() {
    const id = document.getElementById('genId').value;
    const hr = document.getElementById('hours').value;
    if(!hr) return alert("請輸入儀表時數");
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = "⚡ 同步中...";
    const file = document.getElementById('photo').files[0];
    let base64 = "";
    if(file) base64 = await compressImage(file, 1024, 0.7);
    const payload = { genId: id, hours: hr, location: document.getElementById('location').value, note: document.getElementById('note').value, photo: base64, user: "管理員" };
    try {
      await fetch(API_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
      alert("✅ 資料已同步！");
      location.reload();
    } catch(e) { alert("❌ 同步失敗"); }
    btn.disabled = false;
  }

  function compressImage(file, maxWidth, quality) {
    return new Promise((resolve) => {
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image(); img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
      };
    });
  }

  async function fetchReport() {
    const box = document.getElementById('cloudReport');
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      let html = "";
      data.reverse().forEach(r => {
        html += `<div style="border-bottom: 1px solid #1e2d45; padding: 10px 0;">
          <strong style="color:var(--accent)">${r[1]}</strong> | ${r[2]} hr<br>
          <small>${new Date(r[0]).toLocaleString()}</small>
        </div>`;
      });
      box.innerHTML = html || "暫無資料";
    } catch(e) { box.innerHTML = "讀取失敗"; }
  }

  navigator.geolocation.getCurrentPosition(p => {
    document.getElementById('location').value = p.coords.latitude.toFixed(4) + ", " + p.coords.longitude.toFixed(4);
  });
</script>
