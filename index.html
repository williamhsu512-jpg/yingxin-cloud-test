<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>盈鑫雲端管理系統</title>
  <style>
    :root { --bg: #0a0e1a; --card: #161d2e; --accent: #f59e0b; --text: #e2e8f0; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { background: var(--card); padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #1e2d45; }
    .pwd-container { position: relative; margin: 20px 0; }
    input { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #1e2d45; border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; }
    .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2rem; user-select: none; }
    button { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    #errMsg { color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; min-height: 1.2em; }
    #mainApp { display: none; text-align: center; }
  </style>
</head>
<body>

  <div id="loginPage" class="card">
    <h1 style="color:var(--accent); margin:0;">YING XIN</h1>
    <p style="color:#94a3b8; font-size:0.9rem;">發電機管理系統</p>
    <div class="pwd-container">
      <input type="password" id="sysPwd" placeholder="請輸入授權密碼">
      <span id="eyeIcon" class="eye">👁️</span>
    </div>
    <button id="loginBtn">安全登入</button>
    <div id="errMsg"></div>
  </div>

  <div id="mainApp" class="card">
    <h2 style="color:var(--accent)">登入成功</h2>
    <p>系統連線正常，數據已加密</p>
    <button onclick="localStorage.removeItem('isLoggedIn'); location.reload();" style="background:#444; color:#fff;">登出系統</button>
  </div>

  <script>
    // 1. 填入你最新的 GAS 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbxKkbP77jU22O9EGNExXolE7UQcdUzXq0AJZOs-Z6vq7b9EYCDfwM4yfGNkMYcPvKPgVQ/exec";

    // 2. 密碼顯示/隱藏切換 (改用監聽器，防止 Not Defined 錯誤)
    const pwdInput = document.getElementById('sysPwd');
    const eyeIcon = document.getElementById('eyeIcon');

    eyeIcon.addEventListener('click', () => {
      if (pwdInput.type === "password") {
        pwdInput.type = "text";
        eyeIcon.textContent = "🙈";
      } else {
        pwdInput.type = "password";
        eyeIcon.textContent = "👁️";
      }
    });

    // 3. 登入邏輯
    const loginBtn = document.getElementById('loginBtn');
    const errMsg = document.getElementById('errMsg');

    loginBtn.addEventListener('click', async () => {
      const pwd = pwdInput.value;
      if (!pwd) return;

      loginBtn.disabled = true;
      loginBtn.textContent = "驗證中...";
      errMsg.textContent = "";

      try {
        const response = await fetch(`${API_URL}?action=login&auth=${encodeURIComponent(pwd)}`);
        const result = await response.json();

        if (result.status === "success") {
          localStorage.setItem('isLoggedIn', 'true');
          checkStatus();
        } else {
          errMsg.textContent = "❌ 密碼錯誤，請重新輸入";
        }
      } catch (e) {
        errMsg.textContent = "❌ 伺服器連線失敗，請檢查 GAS 部署是否正確";
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "安全登入";
      }
    });

    // 4. 檢查登入狀態
    function checkStatus() {
      if (localStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
      }
    }

    checkStatus();
  </script>
</body>
</html>
